<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Sistema de Puntos — La Gran Semana</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --rosa: #FF6B9D; --lila: #A855F7; --amarillo: #FFD60A;
    --verde: #22C55E; --rojo: #EF4444; --celeste: #38BDF8;
    --bg: #FFF8F0; --card: #FFFFFF; --text: #1E1B4B; --text-light: #6B7280;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text);
    background-image:radial-gradient(circle at 10% 20%,rgba(255,107,157,0.08) 0%,transparent 50%),
                     radial-gradient(circle at 90% 80%,rgba(168,85,247,0.08) 0%,transparent 50%);
    min-height:100vh; padding:20px;
  }
  h1,.score-number{font-family:'Baloo 2',cursive;}

  .header{text-align:center;padding:20px 0 10px;}
  .header h1{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--rosa),var(--lila));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
  .header .subtitle{font-size:0.95rem;color:var(--text-light);margin-top:4px;}
  .stars-deco{font-size:1.5rem;letter-spacing:4px;margin-bottom:6px;}

  .day-selector{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px auto;max-width:1000px;}
  .day-btn{background:white;border:2px solid #E5E7EB;border-radius:12px;padding:8px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;transition:all 0.2s;color:var(--text-light);}
  .day-btn.active{background:linear-gradient(135deg,var(--rosa),var(--lila));border-color:transparent;color:white;transform:translateY(-2px);box-shadow:0 4px 12px rgba(168,85,247,0.3);}
  .day-btn.has-data::after{content:' ✓';font-size:0.7rem;}

  .girls-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:1000px;margin:0 auto 16px;}
  @media(max-width:680px){.girls-grid{grid-template-columns:1fr;}.header h1{font-size:1.7rem;}}

  .girl-panel{background:var(--card);border-radius:24px;padding:18px;box-shadow:var(--shadow);border-top:5px solid var(--rosa);position:relative;overflow:hidden;}
  .girl-panel.girl-2{border-top-color:var(--lila);}
  .girl-panel::before{content:'';position:absolute;top:0;right:0;width:100px;height:100px;border-radius:0 0 0 100%;opacity:0.07;}
  .girl-panel:first-child::before{background:var(--rosa);}
  .girl-panel.girl-2::before{background:var(--lila);}

  .girl-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .girl-emoji{font-size:2.2rem;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:rgba(255,107,157,0.1);border-radius:16px;}
  .girl-2 .girl-emoji{background:rgba(168,85,247,0.1);}
  .girl-name{font-size:1.3rem;font-weight:800;color:var(--rosa);}
  .girl-2 .girl-name{color:var(--lila);}
  .girl-age{font-size:0.8rem;color:var(--text-light);font-weight:600;}

  .score-display{background:linear-gradient(135deg,rgba(255,107,157,0.1),rgba(255,107,157,0.05));border-radius:16px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .girl-2 .score-display{background:linear-gradient(135deg,rgba(168,85,247,0.1),rgba(168,85,247,0.05));}
  .score-label{font-size:0.8rem;color:var(--text-light);font-weight:700;}
  .score-number{font-size:2rem;font-weight:800;color:var(--rosa);line-height:1;}
  .girl-2 .score-number{color:var(--lila);}
  .score-money{font-size:0.85rem;font-weight:700;color:var(--verde);}
  .progress-bar-wrap{background:rgba(0,0,0,0.06);border-radius:20px;height:8px;margin-top:8px;overflow:hidden;}
  .progress-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--rosa),var(--lila));transition:width 0.5s ease;}
  .girl-2 .progress-bar{background:linear-gradient(90deg,var(--lila),var(--celeste));}

  .category-title{font-size:0.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light);margin:12px 0 6px;}
  .task-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:all 0.15s;border:1.5px solid transparent;background:rgba(0,0,0,0.02);}
  .task-item:hover{background:rgba(0,0,0,0.05);}
  .task-item.done{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3);}
  .task-item.negative{background:rgba(239,68,68,0.04);cursor:default;}
  .task-left{display:flex;align-items:center;gap:8px;flex:1;}
  .task-check{width:22px;height:22px;border-radius:6px;border:2px solid #D1D5DB;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;font-size:0.7rem;}
  .task-item.done .task-check{background:var(--verde);border-color:var(--verde);color:white;}
  .task-name{font-size:0.82rem;font-weight:600;color:var(--text);line-height:1.3;}
  .task-item.done .task-name{color:var(--text-light);text-decoration:line-through;}
  .task-pts{font-size:0.8rem;font-weight:800;color:var(--verde);white-space:nowrap;margin-left:6px;}
  .task-pts.negative{color:var(--rojo);}
  .neg-counter{display:flex;align-items:center;gap:6px;}
  .neg-btn{width:26px;height:26px;border-radius:8px;border:none;cursor:pointer;font-size:0.9rem;font-weight:800;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:rgba(239,68,68,0.15);color:var(--rojo);}
  .neg-btn:hover{transform:scale(1.15);}
  .neg-count{font-size:0.85rem;font-weight:800;min-width:20px;text-align:center;color:var(--rojo);}

  .shared-section{max-width:1000px;margin:0 auto 16px;background:var(--card);border-radius:24px;padding:18px 20px;box-shadow:var(--shadow);border-top:5px solid var(--amarillo);}
  .shared-title{font-size:1rem;font-weight:800;margin-bottom:4px;}
  .shared-subtitle{font-size:0.78rem;color:var(--text-light);margin-bottom:12px;}
  .shared-task-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:10px;margin-bottom:4px;border:1.5px solid transparent;background:rgba(0,0,0,0.02);cursor:pointer;transition:all 0.15s;}
  .shared-task-item:hover{background:rgba(255,214,10,0.06);}
  .shared-task-item.done{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3);}
  .shared-pts-pill{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .split-badge{font-size:0.7rem;font-weight:700;background:rgba(255,214,10,0.25);color:#92400E;padding:2px 7px;border-radius:20px;white-space:nowrap;}
  .shared-task-item.done .split-badge{background:rgba(34,197,94,0.2);color:#15803D;}

  .summary-section{max-width:1000px;margin:0 auto 24px;background:var(--card);border-radius:24px;padding:20px;box-shadow:var(--shadow);}
  .summary-title{font-size:1.1rem;font-weight:800;margin-bottom:14px;}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .summary-card{border-radius:16px;padding:14px;text-align:center;}
  .summary-card.girl-1-card{background:linear-gradient(135deg,rgba(255,107,157,0.1),rgba(255,107,157,0.05));border:1.5px solid rgba(255,107,157,0.2);}
  .summary-card.girl-2-card{background:linear-gradient(135deg,rgba(168,85,247,0.1),rgba(168,85,247,0.05));border:1.5px solid rgba(168,85,247,0.2);}
  .summary-pts{font-size:1.8rem;font-weight:800;font-family:'Baloo 2',cursive;line-height:1;}
  .summary-pts.rosa{color:var(--rosa);}
  .summary-pts.lila{color:var(--lila);}
  .summary-money-big{font-size:1.1rem;font-weight:800;color:var(--verde);margin-top:4px;}
  .summary-pct{font-size:0.75rem;color:var(--text-light);margin-top:2px;}

  .ref-section{max-width:1000px;margin:0 auto 24px;background:var(--card);border-radius:24px;padding:20px;box-shadow:var(--shadow);}
  details summary{cursor:pointer;user-select:none;font-size:1rem;font-weight:800;}
  .ref-table{width:100%;border-collapse:collapse;font-size:0.82rem;margin-top:12px;}
  .ref-table th{text-align:left;padding:8px 10px;font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);border-bottom:2px solid #F3F4F6;}
  .ref-table td{padding:7px 10px;border-bottom:1px solid #F9FAFB;vertical-align:top;}
  .ref-table tr:last-child td{border-bottom:none;}
  .cat-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:0.7rem;font-weight:700;}
  .cat-1{background:rgba(56,189,248,0.15);color:#0369A1;}
  .cat-2{background:rgba(34,197,94,0.15);color:#15803D;}
  .cat-3{background:rgba(249,115,22,0.15);color:#C2410C;}
  .cat-4{background:rgba(168,85,247,0.15);color:#7E22CE;}
  .cat-5{background:rgba(255,214,10,0.2);color:#92400E;}
  .cat-neg{background:rgba(239,68,68,0.12);color:#B91C1C;}
  .pts-badge{font-weight:800;font-family:'Baloo 2',cursive;}
  .pts-pos{color:var(--verde);}
  .pts-neg{color:var(--rojo);}

  .reset-btn{display:block;margin:12px auto 0;background:none;border:1.5px solid #E5E7EB;border-radius:10px;padding:8px 20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.8rem;color:var(--text-light);cursor:pointer;transition:all 0.2s;}
  .reset-btn:hover{border-color:var(--rojo);color:var(--rojo);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1E1B4B;color:white;padding:10px 20px;border-radius:50px;font-size:0.85rem;font-weight:700;transition:transform 0.3s;pointer-events:none;z-index:999;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .confetti-pop{position:fixed;top:50%;left:50%;font-size:2rem;pointer-events:none;animation:pop 0.8s ease-out forwards;z-index:999;}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}60%{transform:translate(-50%,-80px) scale(1.4);opacity:1;}100%{transform:translate(-50%,-150px) scale(1);opacity:0;}}
</style>
</head>
<body>

<div class="header">
  <div class="stars-deco">⭐✨🌟</div>
  <h1>La Gran Semana</h1>
  <p class="subtitle">Sumá puntos cada día — ¡el domingo ves tu premio! 💰</p>
</div>

<div class="day-selector" id="daySelector"></div>
<div class="girls-grid" id="girlsGrid"></div>
<div class="shared-section" id="sharedSection"></div>
<div class="summary-section">
  <div class="summary-title">📊 Resumen de la semana</div>
  <div class="summary-grid" id="summaryGrid"></div>
  <button class="reset-btn" onclick="confirmReset()">🔄 Nueva semana</button>
</div>
<div class="ref-section">
  <details>
    <summary>📋 Tabla de referencia — todos los puntos</summary>
    <table class="ref-table" id="refTable"></table>
  </details>
</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'puntos_v3';
var MAX_POINTS = 200;

var GIRLS = [
  { id: 'g1', name: 'Nao',    age: '11 años', emoji: '🌟', color: 'rosa', pi: 0 },
  { id: 'g2', name: 'Chiara', age: '6 años',  emoji: '🌸', color: 'lila', pi: 1 }
];

var DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

var CATEGORIES = [
  { id:'propias', label:'🪥 Cosas propias', badge:'cat-1', badgeText:'PROPIAS', tasks:[
    { id:'levantarse',    name:'Levantarse temprano sola',      pts:[1,1] },
    { id:'dientes',       name:'Lavarse los dientes',           pts:[1,1] },
    { id:'cambiarse',     name:'Cambiarse sola',                pts:[1,1] },
    { id:'deberes',       name:'Hacer los deberes sola',        pts:[3,3] },
    { id:'banarse',       name:'Bañarse sola',                  pts:[2,2] },
    { id:'ordenar_cosas', name:'Ordenar sus cosas',             pts:[1,1] },
    { id:'acostar',       name:'Acostarse antes de las 11 pm',  pts:[1,1] }
  ]},
  { id:'casa_simple', label:'🍽️ Casa — nivel fácil', badge:'cat-2', badgeText:'FÁCIL', tasks:[
    { id:'ordenar_mesa',    name:'Ordenar la mesa',                pts:[1,1] },
    { id:'poner_mesa',      name:'Poner la mesa',                  pts:[2,2] },
    { id:'sacar_mesa',      name:'Sacar la mesa',                  pts:[1,1] },
    { id:'ordenar_casa',    name:'Ordenar la casa (zona)',         pts:[2,2] },
    { id:'gata',            name:'Darle de comer a Mía (la gata)', pts:[2,2] },
    { id:'molly_comida',    name:'Darle de comer a Molly',         pts:[2,2] },
    { id:'agua',            name:'Llenar las botellas de agua',    pts:[1,1] },
    { id:'caja_mia',        name:'Limpiar la caja de Mía',         pts:[4,4] },
    { id:'guardar_vajilla', name:'Guardar vajilla seca',           pts:[2,2] }
  ]},
  { id:'casa_media', label:'🧹 Casa — nivel medio', badge:'cat-3', badgeText:'MEDIO', tasks:[
    { id:'barrer',          name:'Barrer la casa',          pts:[4,4] },
    { id:'lavar_platos',    name:'Lavar los platos',        pts:[4,4] },
    { id:'lavar_ropa',      name:'Lavar ropa',              pts:[4,4] },
    { id:'colgar_ropa',     name:'Colgar ropa',             pts:[3,3] },
    { id:'doblar_ropa',     name:'Doblar y guardar ropa',   pts:[4,4] },
    { id:'regar',           name:'Regar las plantas',       pts:[2,2] },
    { id:'limpiar_muebles', name:'Limpiar los muebles',     pts:[3,3] }
  ]},
  { id:'experto', label:'🧽 Nivel experto', badge:'cat-4', badgeText:'EXPERTO', tasks:[
    { id:'microondas', name:'Limpiar el microondas',               pts:[6,6]   },
    { id:'cocina',     name:'Limpiar la cocina',                   pts:[8,8]   },
    { id:'horno',      name:'Limpiar el horno',                    pts:[8,8]   },
    { id:'banio',      name:'Limpiar baño (inodoro/ducha/pileta)', pts:[10,10] },
    { id:'telaranias', name:'Sacar telarañas',                     pts:[5,5]   }
  ]},
  { id:'maximo', label:'🏆 Nivel MÁXIMO', badge:'cat-5', badgeText:'MÁXIMO', tasks:[
    { id:'caca_molly', name:'💩 Levantar caca de Molly', pts:[10,10] }
  ]}
];

var NEGATIVES = [
  { id:'pelear',         name:'Pelearse con la hermana',    pts:[-2,-2] },
  { id:'pegar',          name:'Pegar',                      pts:[-4,-3] },
  { id:'romper_cosas',   name:'Romper cosas de la hermana', pts:[-4,-3] },
  { id:'desobedecer',    name:'Desobedecer a mamá/papá',    pts:[-3,-2] },
  { id:'mentir',         name:'Mentir',                     pts:[-2,-2] },
  { id:'rabieta',        name:'Rabieta / berrinche',        pts:[-1,-1] },
  { id:'malas_palabras', name:'Decir malas palabras',       pts:[-2,-1] }
];

var SHARED_TASKS = [
  { id:'sh_limpiar_casa',   name:'Limpiar la casa juntas',          pts:14 },
  { id:'sh_lavar_platos',   name:'Lavar y secar los platos juntas', pts:10 },
  { id:'sh_barrer',         name:'Barrer toda la casa juntas',      pts:10 },
  { id:'sh_doblar_ropa',    name:'Doblar y guardar ropa juntas',    pts:10 },
  { id:'sh_ordenar_cuarto', name:'Ordenar el cuarto de las dos',    pts:8  },
  { id:'sh_regar',          name:'Regar todas las plantas juntas',  pts:6  },
  { id:'sh_molly_mia',      name:'Cuidar a Molly y Mía juntas',     pts:6  },
  { id:'sh_cocina',         name:'Limpiar la cocina juntas',        pts:18 },
  { id:'sh_banio',          name:'Limpiar el baño juntas',          pts:20 }
];

// STATE
var state;

function defaultState() {
  var days = {};
  for (var di = 0; di < DAYS.length; di++) {
    var d = DAYS[di];
    days[d] = { shared: {} };
    for (var gi = 0; gi < GIRLS.length; gi++) {
      var g = GIRLS[gi];
      days[d][g.id] = { tasks: {}, negatives: {} };
      for (var ni = 0; ni < NEGATIVES.length; ni++) {
        days[d][g.id].negatives[NEGATIVES[ni].id] = 0;
      }
    }
  }
  return { days: days, currentDay: DAYS[0] };
}

function loadState() {
  try {
    var s = localStorage.getItem(STORAGE_KEY);
    if (!s) return defaultState();
    var parsed = JSON.parse(s);
    // sanitize
    for (var di = 0; di < DAYS.length; di++) {
      var d = DAYS[di];
      if (!parsed.days[d]) parsed.days[d] = { shared: {} };
      if (!parsed.days[d].shared) parsed.days[d].shared = {};
      for (var gi = 0; gi < GIRLS.length; gi++) {
        var g = GIRLS[gi];
        if (!parsed.days[d][g.id]) parsed.days[d][g.id] = { tasks: {}, negatives: {} };
        if (!parsed.days[d][g.id].tasks) parsed.days[d][g.id].tasks = {};
        if (!parsed.days[d][g.id].negatives) parsed.days[d][g.id].negatives = {};
      }
    }
    return parsed;
  } catch(e) { return defaultState(); }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

state = loadState();

// CALCULATIONS
function getSharedDayPts(day) {
  var shared = state.days[day].shared || {};
  var total = 0;
  for (var i = 0; i < SHARED_TASKS.length; i++) {
    if (shared[SHARED_TASKS[i].id]) total += SHARED_TASKS[i].pts;
  }
  return total;
}

function getSharedWeekPts() {
  var total = 0;
  for (var i = 0; i < DAYS.length; i++) total += getSharedDayPts(DAYS[i]);
  return total;
}

function getDayPts(girlId, day) {
  var girl = null;
  for (var i = 0; i < GIRLS.length; i++) { if (GIRLS[i].id === girlId) { girl = GIRLS[i]; break; } }
  var pi = girl ? girl.pi : 0;
  var d = state.days[day][girlId];
  if (!d) return 0;
  var pts = 0;
  var tkeys = Object.keys(d.tasks || {});
  for (var i = 0; i < tkeys.length; i++) {
    if (d.tasks[tkeys[i]]) {
      for (var ci = 0; ci < CATEGORIES.length; ci++) {
        for (var ti = 0; ti < CATEGORIES[ci].tasks.length; ti++) {
          if (CATEGORIES[ci].tasks[ti].id === tkeys[i]) {
            var p = CATEGORIES[ci].tasks[ti].pts;
            pts += Array.isArray(p) ? p[pi] : p;
          }
        }
      }
    }
  }
  var nkeys = Object.keys(d.negatives || {});
  for (var i = 0; i < nkeys.length; i++) {
    var count = d.negatives[nkeys[i]] || 0;
    if (count > 0) {
      for (var ni = 0; ni < NEGATIVES.length; ni++) {
        if (NEGATIVES[ni].id === nkeys[i]) {
          var p = NEGATIVES[ni].pts;
          pts += (Array.isArray(p) ? p[pi] : p) * count;
        }
      }
    }
  }
  return Math.max(0, pts);
}

function getWeekPts(girlId) {
  var total = 0;
  for (var i = 0; i < DAYS.length; i++) total += getDayPts(girlId, DAYS[i]);
  return total + Math.ceil(getSharedWeekPts() / 2);
}

function ptsToMoney(pts) {
  return Math.round((Math.min(pts, MAX_POINTS) / MAX_POINTS) * 10000);
}

function hasDayData(day) {
  for (var gi = 0; gi < GIRLS.length; gi++) {
    var d = state.days[day][GIRLS[gi].id];
    var tkeys = Object.keys(d.tasks || {});
    for (var i = 0; i < tkeys.length; i++) { if (d.tasks[tkeys[i]]) return true; }
    var nkeys = Object.keys(d.negatives || {});
    for (var i = 0; i < nkeys.length; i++) { if (d.negatives[nkeys[i]] > 0) return true; }
  }
  var sh = state.days[day].shared || {};
  var skeys = Object.keys(sh);
  for (var i = 0; i < skeys.length; i++) { if (sh[skeys[i]]) return true; }
  return false;
}

// RENDER
function renderAll() {
  renderDays();
  renderGirls();
  renderShared();
  renderSummary();
}

function renderDays() {
  var html = '';
  for (var i = 0; i < DAYS.length; i++) {
    var d = DAYS[i];
    var cls = (d === state.currentDay ? ' active' : '') + (hasDayData(d) ? ' has-data' : '');
    html += '<button class="day-btn' + cls + '" onclick="selectDay(\'' + d + '\')">' + d + '</button>';
  }
  document.getElementById('daySelector').innerHTML = html;
}

function renderGirls() {
  var html = '';
  for (var gi = 0; gi < GIRLS.length; gi++) {
    var g = GIRLS[gi];
    var day = state.currentDay;
    var dayPts = getDayPts(g.id, day);
    var weekPts = getWeekPts(g.id);
    var pct = Math.min(100, Math.round((weekPts / MAX_POINTS) * 100));
    var money = ptsToMoney(weekPts);
    var d = state.days[day][g.id];

    var tasksHtml = '';
    for (var ci = 0; ci < CATEGORIES.length; ci++) {
      var cat = CATEGORIES[ci];
      tasksHtml += '<div class="category-title">' + cat.label + '</div>';
      for (var ti = 0; ti < cat.tasks.length; ti++) {
        var t = cat.tasks[ti];
        var done = !!(d.tasks && d.tasks[t.id]);
        var tpts = Array.isArray(t.pts) ? t.pts[g.pi] : t.pts;
        tasksHtml += '<div class="task-item' + (done ? ' done' : '') + '" onclick="toggleTask(\'' + g.id + '\',\'' + t.id + '\',\'' + day + '\')">'
          + '<div class="task-left"><div class="task-check">' + (done ? '✓' : '') + '</div>'
          + '<span class="task-name">' + t.name + '</span></div>'
          + '<span class="task-pts">+' + tpts + ' pts</span></div>';
      }
    }

    var negsHtml = '<div class="category-title">⛔ Puntos negativos</div>';
    for (var ni = 0; ni < NEGATIVES.length; ni++) {
      var n = NEGATIVES[ni];
      var count = (d.negatives && d.negatives[n.id]) || 0;
      var npts = Array.isArray(n.pts) ? n.pts[g.pi] : n.pts;
      negsHtml += '<div class="task-item negative">'
        + '<div class="task-left" style="flex:1"><span class="task-name">' + n.name + '</span></div>'
        + '<div class="neg-counter">'
        + '<button class="neg-btn minus" onclick="changeNeg(\'' + g.id + '\',\'' + n.id + '\',\'' + day + '\',-1);event.stopPropagation()">−</button>'
        + '<span class="neg-count">' + count + '</span>'
        + '<button class="neg-btn plus" onclick="changeNeg(\'' + g.id + '\',\'' + n.id + '\',\'' + day + '\',1);event.stopPropagation()">+</button>'
        + '<span class="task-pts negative">' + npts + ' pts</span>'
        + '</div></div>';
    }

    html += '<div class="girl-panel' + (gi === 1 ? ' girl-2' : '') + '">'
      + '<div class="girl-header"><div class="girl-emoji">' + g.emoji + '</div>'
      + '<div><div class="girl-name">' + g.name + '</div><div class="girl-age">' + g.age + '</div></div></div>'
      + '<div class="score-display">'
      + '<div><div class="score-label">HOY (' + day + ')</div><div class="score-number">' + dayPts + '</div><div style="font-size:0.72rem;color:var(--text-light);font-weight:600">puntos hoy</div></div>'
      + '<div style="text-align:right"><div class="score-label">SEMANA</div><div class="score-number">' + weekPts + '/' + MAX_POINTS + '</div><div class="score-money">≈ $' + money.toLocaleString('es-AR') + '</div></div>'
      + '</div>'
      + '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div>'
      + '<div style="text-align:right;font-size:0.72rem;color:var(--text-light);margin-top:4px;margin-bottom:2px">' + pct + '% de la semana</div>'
      + tasksHtml + negsHtml + '</div>';
  }
  document.getElementById('girlsGrid').innerHTML = html;
}

function renderShared() {
  var day = state.currentDay;
  if (!state.days[day].shared) state.days[day].shared = {};
  var shared = state.days[day].shared;
  var dayShPts = getSharedDayPts(day);
  var splitPts = Math.ceil(dayShPts / 2);

  var html = '<div class="shared-title">🤝 Tareas en equipo — ' + day + '</div>'
    + '<div class="shared-subtitle">Los puntos se dividen entre las dos · Hoy suman <strong>' + splitPts + ' pts c/u</strong></div>';

  for (var i = 0; i < SHARED_TASKS.length; i++) {
    var t = SHARED_TASKS[i];
    var done = !!shared[t.id];
    var each = Math.ceil(t.pts / 2);
    var chkStyle = done ? 'background:var(--verde);border-color:var(--verde);color:white' : 'border-color:#FFD60A';
    html += '<div class="shared-task-item' + (done ? ' done' : '') + '" onclick="toggleShared(\'' + t.id + '\',\'' + day + '\')">'
      + '<div class="task-left"><div class="task-check" style="' + chkStyle + '">' + (done ? '✓' : '') + '</div>'
      + '<span class="task-name">' + t.name + '</span></div>'
      + '<div class="shared-pts-pill"><span class="split-badge">+' + each + ' pts c/u</span>'
      + '<span class="task-pts" style="color:var(--text-light);font-size:0.72rem">(' + t.pts + ' total)</span></div></div>';
  }
  document.getElementById('sharedSection').innerHTML = html;
}

function renderSummary() {
  var html = '';
  for (var gi = 0; gi < GIRLS.length; gi++) {
    var g = GIRLS[gi];
    var pts = getWeekPts(g.id);
    var money = ptsToMoney(pts);
    var pct = Math.min(100, Math.round((pts / MAX_POINTS) * 100));
    html += '<div class="summary-card ' + (gi === 0 ? 'girl-1-card' : 'girl-2-card') + '">'
      + '<div style="font-size:1.8rem">' + g.emoji + '</div>'
      + '<div style="font-size:0.85rem;font-weight:800;margin-bottom:6px;color:var(--' + g.color + ')">' + g.name + '</div>'
      + '<div class="summary-pts ' + g.color + '">' + pts + ' pts</div>'
      + '<div class="summary-money-big">$' + money.toLocaleString('es-AR') + '</div>'
      + '<div class="summary-pct">' + pct + '% del máximo</div>'
      + '<div style="margin-top:8px"><div class="progress-bar-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div></div>'
      + '</div>';
  }
  document.getElementById('summaryGrid').innerHTML = html;
}

function renderRefTable() {
  var rows = '<tr><th>Tarea</th><th>Categoría</th><th>Nao (11)</th><th>Chiara (6)</th></tr>';
  for (var ci = 0; ci < CATEGORIES.length; ci++) {
    var cat = CATEGORIES[ci];
    for (var ti = 0; ti < cat.tasks.length; ti++) {
      var t = cat.tasks[ti];
      var p0 = Array.isArray(t.pts) ? t.pts[0] : t.pts;
      var p1 = Array.isArray(t.pts) ? t.pts[1] : t.pts;
      rows += '<tr><td>' + t.name + '</td><td><span class="cat-badge ' + cat.badge + '">' + cat.badgeText + '</span></td>'
        + '<td><span class="pts-badge pts-pos">+' + p0 + '</span></td><td><span class="pts-badge pts-pos">+' + p1 + '</span></td></tr>';
    }
  }
  for (var ni = 0; ni < NEGATIVES.length; ni++) {
    var n = NEGATIVES[ni];
    var p0 = Array.isArray(n.pts) ? n.pts[0] : n.pts;
    var p1 = Array.isArray(n.pts) ? n.pts[1] : n.pts;
    rows += '<tr><td>' + n.name + '</td><td><span class="cat-badge cat-neg">NEGATIVO</span></td>'
      + '<td><span class="pts-badge pts-neg">' + p0 + '</span></td><td><span class="pts-badge pts-neg">' + p1 + '</span></td></tr>';
  }
  rows += '<tr style="background:#F9FAFB"><td colspan="2" style="font-weight:800">TOTAL MÁXIMO SEMANAL</td>'
    + '<td colspan="2"><span class="pts-badge pts-pos">200 pts = $10.000</span></td></tr>';
  document.getElementById('refTable').innerHTML = rows;
}

// ACTIONS
function selectDay(day) {
  state.currentDay = day;
  saveState();
  renderAll();
}

function toggleTask(girlId, taskId, day) {
  var girl = null;
  for (var i = 0; i < GIRLS.length; i++) { if (GIRLS[i].id === girlId) { girl = GIRLS[i]; break; } }
  var d = state.days[day][girlId];
  if (!d.tasks) d.tasks = {};
  var wasDone = !!d.tasks[taskId];
  d.tasks[taskId] = !wasDone;
  saveState();
  if (!wasDone) {
    var allTasks = [];
    for (var ci = 0; ci < CATEGORIES.length; ci++) {
      for (var ti = 0; ti < CATEGORIES[ci].tasks.length; ti++) allTasks.push(CATEGORIES[ci].tasks[ti]);
    }
    for (var i = 0; i < allTasks.length; i++) {
      if (allTasks[i].id === taskId) {
        var p = allTasks[i].pts;
        var tpts = Array.isArray(p) ? p[girl.pi] : p;
        showToast('+' + tpts + ' puntos ✨');
        spawnConfetti();
        break;
      }
    }
  }
  renderAll();
}

function changeNeg(girlId, negId, day, delta) {
  var girl = null;
  for (var i = 0; i < GIRLS.length; i++) { if (GIRLS[i].id === girlId) { girl = GIRLS[i]; break; } }
  var d = state.days[day][girlId];
  if (!d.negatives) d.negatives = {};
  d.negatives[negId] = Math.max(0, (d.negatives[negId] || 0) + delta);
  saveState();
  if (delta > 0) {
    for (var ni = 0; ni < NEGATIVES.length; ni++) {
      if (NEGATIVES[ni].id === negId) {
        var p = NEGATIVES[ni].pts;
        var npts = Array.isArray(p) ? p[girl.pi] : p;
        showToast(npts + ' puntos ⛔');
        break;
      }
    }
  }
  renderAll();
}

function toggleShared(taskId, day) {
  if (!state.days[day].shared) state.days[day].shared = {};
  var wasDone = !!state.days[day].shared[taskId];
  state.days[day].shared[taskId] = !wasDone;
  saveState();
  if (!wasDone) {
    for (var i = 0; i < SHARED_TASKS.length; i++) {
      if (SHARED_TASKS[i].id === taskId) {
        var each = Math.ceil(SHARED_TASKS[i].pts / 2);
        showToast('+' + each + ' pts para cada una 🤝');
        spawnConfetti();
        break;
      }
    }
  }
  renderAll();
}

function confirmReset() {
  if (confirm('¿Empezar nueva semana? Se borran todos los puntos.')) {
    state = defaultState();
    saveState();
    renderAll();
    renderRefTable();
    showToast('¡Nueva semana comenzada! 🌟');
  }
}

var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
}

function spawnConfetti() {
  var emojis = ['⭐','🌟','✨','🎉','💫','🏅'];
  for (var i = 0; i < 3; i++) {
    (function(idx) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'confetti-pop';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (30 + Math.random() * 40) + '%';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 900);
      }, idx * 150);
    })(i);
  }
}

renderAll();
renderRefTable();
</script>
</body>
</html>
